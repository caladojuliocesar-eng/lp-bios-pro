<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{NOME_NEGOCIO}}</title>
    <!-- Fontes Premium -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand: {{COR_DESTAQUE}};
            --brand-light: color-mix(in srgb, var(--brand), white 40%);
            --brand-soft: color-mix(in srgb, var(--brand), transparent 85%);
            --brand-glow: color-mix(in srgb, var(--brand), transparent 70%);
        }

        /* TEMA ESCURO (Padrão Ottomatic) */
        [data-theme="dark"] {
            --bg-dark: #090b0e;
            --bg-card: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --border-light: rgba(255, 255, 255, 0.15);
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --mesh-opacity: 0.15;
            --card-shadow: 0 4px 24px -1px rgba(0,0,0,0.5);
        }

        /* TEMA CLARO (Estética, Saúde, etc) */
        [data-theme="light"] {
            --bg-dark: #f8fafc;
            --bg-card: #ffffff;
            --border: rgba(0, 0, 0, 0.05);
            --border-light: rgba(0, 0, 0, 0.1);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --mesh-opacity: 0.1;
            --card-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
            --brand-light: var(--brand); /* Em light mode, usamos a cor cheia */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* --- MESH GRADIENT BACKGROUND --- */
        .mesh-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        .mesh-bg div {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: var(--mesh-opacity);
            animation: meshFloat 20s infinite alternate;
        }
        .mesh-1 { width: 400px; height: 400px; top: -100px; right: -100px; background: var(--brand); }
        .mesh-2 { width: 300px; height: 300px; bottom: 10%; left: -50px; background: var(--brand); animation-delay: -5s; }

        @keyframes meshFloat {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 100px) scale(1.2); }
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 50px 20px 120px;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        /* --- HERO SECTION --- */
        .hero {
            text-align: center;
            animation: fadeIn 1s ease-out;
        }

        .profile-img-wrap {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 28px;
        }
        .profile-img-wrap::after {
            content: '';
            position: absolute;
            inset: -8px;
            border: 2px solid var(--brand);
            border-radius: 50%;
            opacity: 0.3;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--bg-dark);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--brand-soft);
            border: 1px solid var(--border-light);
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 600;
            color: var(--brand-light);
            margin-bottom: 24px;
            backdrop-filter: blur(5px);
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 12px;
            letter-spacing: -1px;
            background: linear-gradient(180deg, #fff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .diferencial {
            font-size: 16px;
            color: var(--text-muted);
            margin-bottom: 30px;
            padding: 0 10px;
            font-weight: 400;
            line-height: 1.5;
        }

        /* --- BUTTONS --- */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 18px 24px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-primary {
            background-color: var(--brand);
            color: #fff;
            box-shadow: 0 10px 20px -5px var(--brand-glow);
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -5px var(--brand-glow);
            filter: brightness(1.1);
        }

        /* --- SECTIONS --- */
        .section-title {
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--brand-light);
            margin-bottom: 16px;
            opacity: 0.9;
        }

        .glass-card {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: 24px;
            padding: 24px;
            backdrop-filter: blur(10px);
            box-shadow: var(--card-shadow);
        }

        .about-text {
            font-size: 15px;
            line-height: 1.8;
            color: #e2e8f0;
        }

        /* Services Grid */
        .services-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .service-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 18px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 18px;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }
        .service-item:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: var(--brand-soft);
            transform: translateX(4px);
        }

        .service-icon {
            width: 44px;
            height: 44px;
            background: var(--brand-soft);
            color: var(--brand);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-size: 18px;
        }

        .service-desc h4 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 2px;
        }
        .service-desc p {
            font-size: 13px;
            color: var(--text-muted);
        }

        /* Location */
        .location {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 20px;
            background: var(--bg-card);
            border-radius: 20px;
            border: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 14px;
        }

        /* Fixed Button */
        .cta-wrap {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            padding: 0 20px;
            z-index: 100;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            h1 { font-size: 28px; }
        }
    </style>
</head>
<body data-theme="{{TEMA}}">

<div class="mesh-bg">
    <div class="mesh-1"></div>
    <div class="mesh-2"></div>
</div>

<div class="container">
    
    <!-- HEADER -->
    <header class="hero">
        <div class="profile-img-wrap">
            <img src="{{FOTO_URL}}" alt="Foto Perfil" class="profile-img">
        </div>
        <div class="badge">✦ {{PROVA_SOCIAL}}</div>
        <h1>{{NOME_NEGOCIO}}</h1>
        <p class="diferencial">{{DIFERENCIAL}}</p>

        <a href="https://wa.me/{{WHATSAPP}}?text=Olá! Vim pelo link da bio e gostaria de agendar um horário." class="btn btn-primary" target="_blank" rel="noopener">
            Falar agora no WhatsApp
        </a>
    </header>

    <!-- SOBRE -->
    <section>
        <h2 class="section-title">Sobre Mim</h2>
        <div class="glass-card">
            <p class="about-text">{{SOBRE_MIM}}</p>
        </div>
    </section>

    <!-- SERVIÇOS -->
    <section>
        <h2 class="section-title">Serviços & Especialidades</h2>
        <div class="services-grid">
            {{SERVICOS_CARDS}}
        </div>
    </section>

    <!-- LOCALIZAÇÃO -->
    <section>
        <div class="location">
            <span>📍 {{CIDADE}}</span>
        </div>
    </section>

    <!-- FOOTER DA MARCA -->
    <footer style="text-align: center; margin-top: 20px;">
        <p style="font-size: 11px; color: var(--text-muted); opacity: 0.5;">Powered by LP Bios Pro</p>
    </footer>

</div>

<!-- CTA FIXO -->
<div class="cta-wrap">
    <a href="https://wa.me/{{WHATSAPP}}?text=Olá, gostaria de saber mais sobre seus serviços!" class="btn btn-primary">
        Agendar Horário
    </a>
</div>

</body>
</html>
