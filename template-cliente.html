<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{NOME_NEGOCIO}}</title>
    <!-- Fontes Premium -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand: {{COR_DESTAQUE}};
            --bg-dark: #0f1115;
            --bg-card: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* Ambient Background Glow */
        body::before {
            content: '';
            position: fixed;
            top: -20vh;
            left: -10vw;
            width: 120vw;
            height: 120vh;
            background: radial-gradient(circle at 50% 0%, var(--brand) 0%, transparent 60%);
            opacity: 0.08;
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 40px 24px 100px;
            display: flex;
            flex-direction: column;
            gap: 48px;
        }

        /* --- HERO SECTION --- */
        .hero {
            text-align: center;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .profile-img-wrap {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 24px;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--bg-dark);
            box-shadow: 0 0 0 2px var(--brand);
            padding: 4px;
        }

        .badge {
            display: inline-block;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 500;
            color: var(--brand);
            margin-bottom: 16px;
            letter-spacing: 0.5px;
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .diferencial {
            font-size: 16px;
            color: var(--text-muted);
            margin-bottom: 32px;
            padding: 0 10px;
        }

        /* --- BUTTONS --- */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 18px 24px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background-color: var(--brand);
            color: #fff;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            /* If the brand color is dark, text needs to be white. We assume brand is vibrant */
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        /* SVG Icon for WhatsApp */
        .wpp-icon {
            width: 20px; height: 20px; fill: currentColor;
        }

        /* --- SECTIONS (Glassmorphism Cards) --- */
        .section-title {
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .section-title::after {
            content: ''; flex: 1; height: 1px; background: var(--border);
        }

        .glass-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 32px 24px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .about-text {
            font-size: 15px;
            line-height: 1.8;
            color: var(--text-muted);
        }

        /* Services List */
        .services-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .service-item {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            padding: 20px;
            background: rgba(0,0,0,0.2);
            border-radius: 16px;
            border: 1px solid var(--border);
            transition: border-color 0.3s ease;
        }

        .service-item:hover {
            border-color: var(--brand);
        }

        .service-icon {
            color: var(--brand);
            font-size: 20px;
            margin-top: 2px;
        }

        .service-desc h4 {
            font-size: 16px;
            margin-bottom: 4px;
            color: var(--text-main);
        }

        .service-desc p {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.5;
        }

        /* Location */
        .location {
            text-align: center;
            padding: 24px;
            background: rgba(255,255,255,0.02);
            border-radius: 16px;
            border: 1px dashed var(--border);
        }

        /* Floating CTA */
        .floating-cta {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 48px);
            max-width: 432px;
            z-index: 100;
            animation: bounceIn 1s cubic-bezier(0.16, 1, 0.3, 1) 1s forwards;
            opacity: 0;
        }

        /* Animations */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes bounceIn {
            0% { opacity: 0; transform: translate(-50%, 40px); }
            100% { opacity: 1; transform: translate(-50%, 0); }
        }
    </style>
</head>
<body>

<div class="container">
    
    <!-- HEADER / HERO -->
    <header class="hero">
        <div class="profile-img-wrap">
            <img src="{{FOTO_URL}}" alt="Foto Perfil" class="profile-img">
        </div>
        <div class="badge">💎 {{PROVA_SOCIAL}}</div>
        <h1>{{NOME_NEGOCIO}}</h1>
        <p class="diferencial">{{DIFERENCIAL}}</p>

        <a href="https://wa.me/{{WHATSAPP}}?text=Olá! Vim pelo link da bio e gostaria de agendar um horário." class="btn btn-primary" target="_blank" rel="noopener">
            <svg class="wpp-icon" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.557 4.123 1.528 5.855L.057 23.25c-.085.32.213.617.532.532l5.395-1.471A11.952 11.952 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.907 0-3.695-.513-5.235-1.407l-.376-.218-3.893 1.06 1.062-3.894-.228-.386A9.956 9.956 0 012 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>
            Falar pelo WhatsApp
        </a>
    </header>

    <!-- SOBRE A PESSOA -->
    <section>
        <h2 class="section-title">Sobre Mim</h2>
        <div class="glass-card">
            <p class="about-text">{{SOBRE_MIM}}</p>
        </div>
    </section>

    <!-- SERVIÇOS -->
    <section>
        <h2 class="section-title">Como posso te ajudar</h2>
        <div class="services-list">
            {{SERVICOS_CARDS}}
        </div>
    </section>

    <!-- ONDE ATENDO -->
    <section>
        <h2 class="section-title">Atendimento</h2>
        <div class="location">
            <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 4px;">Localizado em</p>
            <p style="font-weight: 600; font-size: 16px;">📍 {{CIDADE}}</p>
        </div>
    </section>

</div>

<!-- FLOATING CTA (Aparece ao rolar pra não perder a conversão) -->
<div class="floating-cta">
    <a href="https://wa.me/{{WHATSAPP}}?text=Olá, vim pela página e quero um orçamento." class="btn btn-primary" target="_blank" rel="noopener">
        Agendar meu horário agora
    </a>
</div>

</body>
</html>
